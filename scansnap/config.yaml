name: "ScanSnap iX500"
description: "One-button duplex OCR scanning to Nextcloud via File Drop"
version: "1.1.6"
slug: "scansnap_ix500"
init: false
arch:
  - amd64

homeassistant_api: true

# full_access gives the container access to all host devices (needed for USB
# scanner whose /dev/bus/usb/XXX/YYY path can change between reboots)
full_access: true

# Ingress panel - embedded "Scan Now" page in the HA sidebar
ingress: true
panel_icon: mdi:scanner
panel_title: Scanner

options:
  nextcloud_url: ""
  nextcloud_share_token: ""
  nextcloud_share_password: ""
  scan_resolution: 300
  ocr_language: "eng"
  scan_duplex: true
  scan_color: "Color"

schema:
  nextcloud_url: str
  nextcloud_share_token: str
  nextcloud_share_password: str?
  scan_resolution: int
  ocr_language: str
  scan_duplex: bool
  scan_color: list(Color|Gray|Lineart)
