name: "ScanSnap iX500"
description: "One-button duplex OCR scanning to configurable storage backends"
version: "1.0.6"
slug: "scansnap_ix500"
init: false
arch:
  - amd64

# full_access gives the container access to all host devices (needed for USB
# scanner whose /dev/bus/usb/XXX/YYY path can change between reboots)
full_access: true

options:
  # Storage backend settings
  storage_backend: "nextcloud"
  nextcloud_url: ""
  nextcloud_share_token: ""
  nextcloud_share_password: ""
  seafile_upload_url: ""

  # Scan and OCR settings
  scan_profile: "stable_300"
  processing_profile: "baseline"
  archive_raw_scans: false
  raw_scan_archive_dir: "/share/scansnap-raw"
  ocr_language: "eng"
  scan_duplex: true
  scan_color: "Color"

schema:
  # Storage backend settings
  storage_backend: list(nextcloud|seafile)
  nextcloud_url: str
  nextcloud_share_token: str
  nextcloud_share_password: str?
  seafile_upload_url: str

  # Scan and OCR settings
  scan_profile: list(stable_300|stable_600)
  processing_profile: list(baseline|gray_light|gray_soft|gray_bg_flatten)
  archive_raw_scans: bool
  raw_scan_archive_dir: str
  ocr_language: str
  scan_duplex: bool
  scan_color: list(Color|Gray|Lineart)
