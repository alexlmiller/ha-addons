global {
  debug = false;
  debug-level = 1;
  user = root;
  group = root;
  syslog = false;
  pidfile = "/var/run/scanbd/scanbd.pid";
  timeout = 500;

  environment {
    device = "SCANBD_DEVICE";
    action = "SCANBD_ACTION";
  }

  multiple_actions = true;
  scriptdir = /etc/scanbd/scripts;

  device {
    filter = ".*fujitsu.*";
    desc = "Fujitsu ScanSnap iX500";

    action scan {
      # The fujitsu SANE backend exposes the button as option "scan"
      # with value 1=idle, 0=pressed. Verify with:
      #   scanimage -d fujitsu --all-options 2>/dev/null | grep -A5 button
      filter = "^scan$";
      numerical-trigger {
        from-value = 1;
        to-value = 0;
      }
      desc = "Scan button pressed";
      script = "scan.sh";
    }
  }
}
